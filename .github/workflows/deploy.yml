# Workflow para construir e publicar o site no GitHub Pages com a IA ativa
name: Deploy static content to Pages

on:
  # Roda toda vez que você salvar (Push) na branch principal
  push:
    branches: ["main"]

  # Permite rodar manualmente se precisar
  workflow_dispatch:

# Permissões necessárias para o GitHub publicar o site
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy aconteça por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        # Aqui é onde a mágica acontece: pegamos a chave secreta e entregamos ao site
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Pasta onde o site pronto fica guardado
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
